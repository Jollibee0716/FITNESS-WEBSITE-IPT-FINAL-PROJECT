<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MainPage</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
  <style>
    html, body {
      padding: 0;
      height: 100%;
      margin: 0;
      height: 100vh;
      background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95)), 
                  url('Images/web3.jpg') center/cover no-repeat fixed;
      overflow-x: auto;  
      overflow-y: auto;   
      font-family: 'Times New Roman', Times, serif;
      scroll-behavior: auto;
    }

    /* Added this to ensure links don't show browser defaults */
    .option-wrapper {
      text-decoration: none;
      display: block;
    }

    section {
      height: 100vh;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .options {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .option-wrapper {
      position: relative;
      width: 250px;
      height: 250px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .option {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      transition: transform 0.3s ease;
      background-color: rgb(125, 71, 5);
    }

    .caption {
      position: absolute;
      left: 25%;
      bottom: 10px;
      color: white;
      font-size: 20px;
      background: rgba(0,0,0,0.4);
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: opacity 0.3s ease, transform 0.3s ease;
      opacity: 0.8;
      transform: translateY(10px);
    }

    .option-wrapper:hover .option {
      transform: scale(1.05);
    }

    .option-wrapper:hover .caption {
      opacity: 1;
      transform: translateY(0);
    }

    .options:hover .option-wrapper:not(:hover) {
      transform: scale(0.95);
      opacity: 0.7;
    }

    .section-caption {
      margin-bottom: 60px;
      color: white;
      font-size: 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
      background: rgba(0,0,0,0.4);
      padding: 5px 10px;
      border-radius: 5px;
      font-family: 'Oswald', sans-serif;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 1000;
    }

    .back-btn img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      transition: transform 0.3s;
    }

    .back-btn img:hover {
      transform: scale(1.2);
    }
  </style>
</head>

<body>

<section id="section1" style="display: flex;">
  <div class="section-caption">Select your Gender</div>
  <div class="options">
    <div class="option-wrapper" onclick="next('section2')">
      <img src="Images/web6.png" class="option">
      <div class="caption">Male</div>
    </div>
    <div class="option-wrapper" onclick="next('section3')">
      <img src="Images/web7.png" class="option">
      <div class="caption">Female</div>
    </div>
  </div>
</section>

<section id="section2">
  <button class="back-btn" data-back="section1"><img src="Images/balik.png"></button>
  <div class="section-caption">Select your objective</div>
  <div class="options">
    <a href="loseweight_M.html" class="option-wrapper">
      <img src="Images/web8.png" class="option">
      <div class="caption">Lose weight</div>
    </a>
    <a href="gainweight_M.html" class="option-wrapper">
      <img src="Images/web9.png" class="option">
      <div class="caption">Gain Muscle</div>
    </a>
    <a href="maintainweight_M.html" class="option-wrapper">
      <img src="Images/web10.png" class="option">
      <div class="caption">Maintain</div>
    </a>
  </div>
</section>

<section id="section3">
  <button class="back-btn" data-back="section1"><img src="Images/balik.png"></button>
  <div class="section-caption">Select your objective</div>
  <div class="options">
    <a href="loseweight_F.html" class="option-wrapper">
      <img src="Images/web15.png" class="option">
      <div class="caption">Lose weight</div>
    </a>
    <a href="gainweight_F.html" class="option-wrapper">
      <img src="Images/web16.png" class="option">
      <div class="caption">Gain Muscle</div>
    </a>
    <a href="maintainweight_F.html" class="option-wrapper">
      <img src="Images/web17.png" class="option">
      <div class="caption">Maintain</div>
    </a>
  </div>
</section>

<script>
  function next(sectionId) {
    window.scrollTo(0, 0);
    document.querySelectorAll("section").forEach(sec => sec.style.display = "none");
    document.getElementById(sectionId).style.display = "flex";
  }

  document.querySelectorAll(".back-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      next(btn.getAttribute("data-back"));
    });
  });
</script>

</body>
</html>
